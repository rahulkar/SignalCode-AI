services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    env_file:
      - ./litellm/.env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      STORE_MODEL_IN_DB: "false"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/health/readiness', timeout=5)",
        ]
      interval: 5s
      timeout: 8s
      retries: 18
      start_period: 45s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: signalcode-dashboard
    ports:
      - "5173:80"
    depends_on:
      - backend
      - litellm

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signalcode-backend
    environment:
      PORT: 3001
      DATABASE_PATH: /app/data/telemetry.db
      TEAM_CONFIG_PATH: /app/teams.json
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_MODEL: gemini-flash
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
      - ./teams.json:/app/teams.json:ro
    depends_on:
      litellm:
        condition: service_healthy
